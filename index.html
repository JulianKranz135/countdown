<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/img/icon.ico" rel="icon" type="image/x-icon">
    <title>Countdown</title>
</head>
<body>
    <div class="container">
        <h1>Pause in</h1>
        <div class="countdown" id="cd-pause">
            <div class="time-box"><span class="number day">00</span><span class="label">Tage</span></div>
            <div class="time-box"><span class="number hour">00</span><span class="label">Std</span></div>
            <div class="time-box"><span class="number min">00</span><span class="label">Min</span></div>
            <div class="time-box"><span class="number sec">00</span><span class="label">Sek</span></div>
        </div>
    </div>

    <div class="container">
        <h1>Schule aus in</h1>
        <div class="countdown" id="cd-school">
            <div class="time-box"><span class="number day">00</span><span class="label">Tage</span></div>
            <div class="time-box"><span class="number hour">00</span><span class="label">Std</span></div>
            <div class="time-box"><span class="number min">00</span><span class="label">Min</span></div>
            <div class="time-box"><span class="number sec">00</span><span class="label">Sek</span></div>
        </div>
    </div>

    <div class="container">
        <h1>Ferien in</h1>
        <div class="countdown" id="cd-vacation">
            <div class="time-box"><span class="number day">00</span><span class="label">Tage</span></div>
            <div class="time-box"><span class="number hour">00</span><span class="label">Std</span></div>
            <div class="time-box"><span class="number min">00</span><span class="label">Min</span></div>
            <div class="time-box"><span class="number sec">00</span><span class="label">Sek</span></div>
        </div>
    </div>
</body>
<script type="text/javascript" src="assets/js/script.js"></script>
</html>
